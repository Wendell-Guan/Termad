changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "Features"
      labels:
        - feature
        - enhancement
    - title: "Fixes"
      labels:
        - fix
        - bug
    - title: "Documentation"
      labels:
        - docs
    - title: "Maintenance"
      labels:
        - chore
        - ci
        - refactor
